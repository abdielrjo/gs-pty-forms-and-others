<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Global Shapers Panama</title>
    <style>
        :root {
            --blue-shapers: #00548E;
            --white: #ffffff;
            --gray-bg: #f9f9f9;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--blue-shapers);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-container img {
            max-width: 200px;
            height: auto;
        }
        h2 { 
            color: var(--blue-shapers); 
            margin-bottom: 25px;
            font-weight: 600;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-size: 0.9rem;
        }
        input[type="text"], 
        input[type="email"], 
        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--blue-shapers);
            outline: none;
        }
        .checkbox-group {
            text-align: left;
            margin: 20px 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.95rem;
            color: #444;
            cursor: pointer;
        }
        .checkbox-group input {
            margin-top: 4px;
            flex-shrink: 0;
        }
        .checkbox-group.required-check a {
            color: var(--blue-shapers);
            text-decoration: underline;
            font-weight: 600;
        }
        .checkbox-group.required-check a:hover {
            color: #003d66;
        }
        .checkbox-required-note {
            font-size: 0.78rem;
            color: #c62828;
            margin-top: -12px;
            margin-bottom: 10px;
            text-align: left;
            display: none;
        }
        button#btn-submit {
            background-color: var(--blue-shapers);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
        button#btn-submit:hover { background-color: #003d66; }
        button#btn-submit:disabled { background-color: #aaa; cursor: not-allowed; }
        #status-msg {
            margin-top: 12px;
            font-size: 0.9rem;
            min-height: 20px;
        }
        .msg-ok  { color: #2e7d32; }
        .msg-err { color: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img id="logo" src="https://raw.githubusercontent.com/abdielrjo/gs-pty-forms-and-others/refs/heads/main/logo.png" alt="Global Shapers Panama">
    </div>
    
    <h2>¡Cuéntanos más sobre ti!</h2>
    
    <form id="regForm">
        <div class="form-group">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
        </div>

        <div class="form-group">
            <input type="number" id="edad" placeholder="Edad" required min="18"
                   oninvalid="this.setCustomValidity('Debes tener al menos 18 años')" 
                   oninput="this.setCustomValidity('')">
        </div>

        <div class="form-group">
            <input type="email" id="correo" placeholder="Correo electrónico" required 
                   oninvalid="this.setCustomValidity('Coloca una dirección de correo electrónico válida')" 
                   oninput="this.setCustomValidity('')">
        </div>
        
        <label class="checkbox-group required-check">
            <input type="checkbox" id="privacidad" required>
            <span>He leído y acepto la 
                <a href="https://drive.google.com/file/d/1Q3UmtbCKSg2yer67Mdfnd_O7gxlgWT7q/view?usp=drivesdk" 
                   target="_blank" rel="noopener noreferrer">
                   Política de Privacidad y Tratamiento de Datos Personales
                </a> 
                de Global Shapers Panama, y autorizo el uso de mis datos con los fines allí descritos. <strong>*</strong>
            </span>
        </label>
        <div class="checkbox-required-note" id="privacidad-nota">
            ⚠ Debes aceptar la política de privacidad para continuar.
        </div>
        
        <button type="submit" id="btn-submit">Registrarme</button>
        <div id="status-msg"></div>
    </form>

</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxjP6gukhjzLqwKTtW55W2PYfirxwTior1LansqMQ9r7OQbvQJkjP1PtKDYLgcg0oCF/exec";

    const form       = document.getElementById('regForm');
    const btnSubmit  = document.getElementById('btn-submit');
    const statusMsg  = document.getElementById('status-msg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const edadValue = parseInt(document.getElementById('edad').value);
        if (edadValue < 18) {
            alert("Registro rechazado: Debes tener al menos 18 años para participar.");
            return;
        }

        const privacidadCheck = document.getElementById('privacidad');
        const privacidadNota  = document.getElementById('privacidad-nota');
        if (!privacidadCheck.checked) {
            privacidadNota.style.display = 'block';
            privacidadCheck.closest('label').scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }
        privacidadNota.style.display = 'none';

        const nuevoRegistro = {
            nombre:     document.getElementById('nombre').value,
            edad:       edadValue,
            correo:     document.getElementById('correo').value,
            fecha:      new Date().toLocaleString('es-PA')
        };

        // UI: estado de carga
        btnSubmit.disabled = true;
        btnSubmit.textContent = "Enviando...";
        statusMsg.textContent = "";
        statusMsg.className = "";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",   // necesario para Apps Script
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(nuevoRegistro)
            });

            // no-cors no devuelve respuesta, pero si no lanza error es exitoso
            statusMsg.textContent = "¡Gracias por registrarte con Global Shapers Panama!";
            statusMsg.className = "msg-ok";

            // Limpiar formulario
            document.getElementById('nombre').value = "";
            document.getElementById('edad').value = "";
            document.getElementById('correo').value = "";
            document.getElementById('privacidad').checked = false;

        } catch (err) {
            statusMsg.textContent = "Error al enviar. Verifica tu conexión e intenta de nuevo.";
            statusMsg.className = "msg-err";
        } finally {
            btnSubmit.disabled = false;
            btnSubmit.textContent = "Registrarme";
        }
    });
</script>

</body>
</html>
