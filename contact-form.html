<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Global Shapers Panama</title>
    <style>
        :root {
            --blue-shapers: #00548E;
            --white: #ffffff;
            --gray-bg: #f9f9f9;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--blue-shapers);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        /* SECCIÓN DE LA IMAGEN */
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-container img {
            max-width: 200px;
            height: auto;
        }
        h2 { 
            color: var(--blue-shapers); 
            margin-bottom: 25px;
            font-weight: 600;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-size: 0.9rem;
        }
        input[type="text"], 
        input[type="email"], 
        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--blue-shapers);
            outline: none;
        }
        .checkbox-group {
            text-align: left;
            margin: 20px 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.95rem;
            color: #444;
            cursor: pointer;
        }
        .checkbox-group input {
            margin-top: 4px;
        }
        button#btn-submit {
            background-color: var(--blue-shapers);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button#btn-submit:hover { background-color: #003d66; }
        .admin-section {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .admin-btn {
            background: none;
            color: #bbb;
            font-size: 0.75rem;
            border: none;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img id="logo" src="logo.png" alt="Global Shapers Panama">
    </div>
    
    <h2>¡Cuéntanos más sobre ti!</h2>
    
    <form id="regForm">
        <div class="form-group">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
        </div>

        <div class="form-group">
            <input type="number" id="edad" placeholder="Edad" required min="18"
		   oninvalid="this.setCustomValidity('Debes tener al menos de 18 años')" 
		   oninput="this.setCustomValidity('')">
        </div>

        <div class="form-group">
            <input type="email" id="correo" placeholder="Correo electrónico" required 
                   oninvalid="this.setCustomValidity('Coloca una dirección de correo electrónico válida')" 
                   oninput="this.setCustomValidity('')">
        </div>
        
        <label class="checkbox-group">
            <input type="checkbox" id="newsletter">
            <span>Deseo unirme al newsletter de Global Shapers Panama</span>
        </label>
        
        <button type="submit" id="btn-submit">Registrarme</button>
    </form>

    <div class="admin-section">
        <button class="admin-btn" onclick="exportCSV()">Descargar base de datos (CSV)</button>
    </div>
</div>

<script>
    const form = document.getElementById('regForm');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const edadValue = parseInt(document.getElementById('edad').value);

        // VALIDACIÓN DE EDAD
        if (edadValue < 18) {
            alert("Registro rechazado: Debes tener al menos 18 años para participar.");
            return;
        }

        const nuevoRegistro = {
            nombre: document.getElementById('nombre').value,
            edad: edadValue,
            correo: document.getElementById('correo').value,
            newsletter: document.getElementById('newsletter').checked ? 'Sí' : 'No',
            fecha: new Date().toLocaleString()
        };

        // Guardar localmente
        let datos = JSON.parse(localStorage.getItem('shapers_db')) || [];
        datos.push(nuevoRegistro);
        localStorage.setItem('shapers_db', JSON.stringify(datos));

        // MENSAJE DE ÉXITO
        alert('¡Gracias por registrarte con Global Shapers Panama!');

        // --- LIMPIEZA MANUAL (Fuerza Bruta) ---
        document.getElementById('nombre').value = "";
        document.getElementById('edad').value = "";
        document.getElementById('correo').value = "";
        document.getElementById('newsletter').checked = false;
    });

    function exportCSV() {
        let datos = JSON.parse(localStorage.getItem('shapers_db')) || [];
        if(datos.length === 0) return alert('No hay datos para exportar.');

        let csvContent = "\uFEFFFecha,Nombre,Edad,Correo,Newsletter\n";
        datos.forEach(r => {
            csvContent += `"${r.fecha}","${r.nombre}","${r.edad}","${r.correo}","${r.newsletter}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "contactos_Global_Shapers_Panama.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
